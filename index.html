<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>My Daily Tasks</h1>
    
    <div class="input-group">
      <input type="text" id="new-task" placeholder="Apa yang ingin dikerjakan?">
      <button id="add-task">Tambah</button>
    </div>

    <input type="text" id="search-task" placeholder="🔍 Cari tugas anda...">

    <ul id="task-list">
      </ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
